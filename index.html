
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轻松学 - AI 问答引导式学习</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 装饰背景 -->
  <div class="bg-decor">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
    <div class="bg-dot bg-dot-1"></div>
    <div class="bg-dot bg-dot-2"></div>
    <div class="bg-dot bg-dot-3"></div>
  </div>

  <div class="app-container">

    <!-- ========== 首页 ========== -->
    <section id="page-home" class="page page-home active">
      <div class="home-content">
        <div class="brand-icon">🚀</div>
        <h1 class="brand-title">轻松学</h1>
        <p class="brand-subtitle">AI 问答引导式学习 · 闯关式掌握新知识</p>

        <div class="input-group">
          <input
            type="text"
            id="topic-input"
            placeholder="输入你想学习的主题..."
            autocomplete="off"
          >
          <button id="start-btn" class="btn-primary">
            <span>开始学习</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </div>

        <div class="topic-tags">
          <span class="topic-tag" data-topic="语文">📖 语文</span>
          <span class="topic-tag" data-topic="英语">🔤 英语</span>
          <span class="topic-tag" data-topic="物理">⚡ 物理</span>
          <span class="topic-tag" data-topic="化学">🧪 化学</span>
          <span class="topic-tag" data-topic="生物">🧬 生物</span>
          <span class="topic-tag" data-topic="历史">📜 历史</span>
          <span class="topic-tag" data-topic="地理">🌍 地理</span>
          <span class="topic-tag" data-topic="政治">🏛️ 政治</span>
          <span class="topic-tag" data-topic="数学基础">📐 数学</span>
          <span class="topic-tag" data-topic="Python基础">🐍 Python</span>
          <span class="topic-tag" data-topic="科学常识">🔬 科学常识</span>
        </div>
      </div>
    </section>

    <!-- ========== 答题页 ========== -->
    <section id="page-quiz" class="page page-quiz">
      <!-- 主题名称 -->
      <div class="topic-header">
        <span class="topic-icon">📚</span>
        <span id="topic-name" class="topic-name-text">主题</span>
      </div>

      <!-- 进度条 -->
      <div class="progress-bar-wrapper">
        <div class="progress-info">
          <span class="progress-label">闯关进度</span>
          <span id="progress-text" class="progress-text">1/10</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <!-- 加载动画 -->
      <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner">
          <div class="spinner-ring"></div>
          <div class="spinner-dot"></div>
        </div>
        <p id="loading-text" class="loading-text">正在准备题目...</p>
      </div>

      <!-- 错误提示 -->
      <div id="error-overlay" class="error-overlay">
        <div class="error-icon">😵</div>
        <p id="error-msg" class="error-msg">生成题目失败，请稍后重试</p>
        <div class="error-actions">
          <button id="error-retry-btn" class="btn-primary">🔄 重新生成</button>
          <button id="error-back-btn" class="btn-secondary">🏠 返回首页</button>
        </div>
      </div>

      <!-- 题目卡片 -->
      <div class="quiz-card" id="quiz-card">
        <div class="quiz-card-inner">
          <div class="question-number" id="question-number">第 1 题</div>
          <h2 class="question-text" id="question-text"></h2>

          <div class="options" id="options-container">
            <button class="option-btn" data-label="A">
              <span class="option-label">A</span>
              <span class="option-text" id="opt-a"></span>
            </button>
            <button class="option-btn" data-label="B">
              <span class="option-label">B</span>
              <span class="option-text" id="opt-b"></span>
            </button>
            <button class="option-btn" data-label="C">
              <span class="option-label">C</span>
              <span class="option-text" id="opt-c"></span>
            </button>
            <button class="option-btn" data-label="D">
              <span class="option-label">D</span>
              <span class="option-text" id="opt-d"></span>
            </button>
          </div>

          <!-- 答题反馈 -->
          <div class="feedback" id="feedback">
            <div class="feedback-icon" id="feedback-icon"></div>
            <div class="feedback-text" id="feedback-text"></div>
            <div class="feedback-explanation" id="feedback-explanation"></div>
          </div>
        </div>
      </div>

      <!-- 下一题按钮 -->
      <button id="next-btn" class="btn-primary btn-next hidden">
        <span>下一题</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </section>

    <!-- ========== 结果页 ========== -->
    <section id="page-result" class="page page-result">
      <div class="result-content">
        <div class="result-badge" id="result-badge"></div>
        <h2 class="result-title" id="result-title">闯关完成！</h2>

        <div class="score-ring-wrapper">
          <svg class="score-ring" viewBox="0 0 120 120">
            <circle class="score-ring-bg" cx="60" cy="60" r="52"/>
            <circle class="score-ring-fill" id="score-ring-fill" cx="60" cy="60" r="52"/>
          </svg>
          <div class="score-ring-text">
            <span class="score-number" id="score-number">0</span>
            <span class="score-unit">分</span>
          </div>
        </div>

        <div class="result-stats">
          <div class="stat-item">
            <span class="stat-value" id="stat-correct">0</span>
            <span class="stat-label">答对</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">总题数</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-value" id="stat-rate">0%</span>
            <span class="stat-label">正确率</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-value" id="stat-time">0s</span>
            <span class="stat-label">用时</span>
          </div>
        </div>

        <div class="result-actions">
          <button id="retry-btn" class="btn-secondary">🔄 重新挑战</button>
          <button id="change-topic-btn" class="btn-primary">🎯 换个主题</button>
        </div>
      </div>
    </section>

  </div>

  <!-- 撒花画布 -->
  <canvas id="confetti-canvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
